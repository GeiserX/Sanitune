services:
  sanitune-web:
    image: drumsergio/sanitune:0.5.2
    ports:
      - "7860:7860"
    volumes:
      # Cache models across runs (Demucs ~300MB, Whisper ~1.5GB)
      - /mnt/user/appdata/sanitune/cache:/root/.cache
    environment:
      - SANITUNE_DEVICE=cpu
      - SANITUNE_LANGUAGE=es
      - SANITUNE_DEFAULT_MODE=mute
      # Optional: AI replacement suggestions
      # - SANITUNE_AI_API_KEY=sk-...
      # Optional: Kits.ai voice conversion
      # - KITS_API_KEY=
      # - KITS_VOICE_MODEL_ID=
    entrypoint: ["python", "-m", "sanitune", "web", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped


  # CLI usage (on-demand, not always running):
  # docker compose run --rm sanitune-cli process /app/input/song.mp3 -o /app/output/song_clean.wav
